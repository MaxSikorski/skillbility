# Skillbility skill: filament-swap v1.0.0
# https://github.com/MaxSikorski/skillbility
# License: MIT
#
# Adds LOAD_FILAMENT and UNLOAD_FILAMENT.
# Tune the values in _SKB_FILAMENT_SWAP_VARS below (or via the store, soon).

[gcode_macro _SKB_FILAMENT_SWAP_VARS]
description: Settings for the Filament Swap skill
variable_load_temp: 220       ; default nozzle temp (C)
variable_load_length: 50      ; fast feed distance (mm)
variable_purge_length: 25     ; slow purge after load (mm)
variable_unload_length: 60    ; retract distance on unload (mm)
variable_speed_slow: 300      ; purge speed (mm/min)
variable_speed_fast: 1200     ; bulk feed speed (mm/min)
gcode:
    # Settings container only — nothing to execute.

[gcode_macro LOAD_FILAMENT]
description: Heat if needed, feed filament, purge. Usage: LOAD_FILAMENT [TEMP=220]
gcode:
    {% set v = printer["gcode_macro _SKB_FILAMENT_SWAP_VARS"] %}
    {% set target = params.TEMP|default(v.load_temp)|float %}
    SAVE_GCODE_STATE NAME=skb_load
    RESPOND PREFIX="Skillbility:" MSG="Loading filament at {target}C"
    {% if printer.extruder.temperature < target - 5 %}
        M109 S{target}
    {% endif %}
    M83                                        ; relative extrusion
    G1 E{v.load_length} F{v.speed_fast}        ; feed toward nozzle
    G1 E{v.purge_length} F{v.speed_slow}       ; purge
    M400
    RESPOND PREFIX="Skillbility:" MSG="Load complete. Wipe the purge off the nozzle."
    RESTORE_GCODE_STATE NAME=skb_load

[gcode_macro UNLOAD_FILAMENT]
description: Heat if needed, then retract filament clear of the gears. Usage: UNLOAD_FILAMENT [TEMP=220]
gcode:
    {% set v = printer["gcode_macro _SKB_FILAMENT_SWAP_VARS"] %}
    {% set target = params.TEMP|default(v.load_temp)|float %}
    SAVE_GCODE_STATE NAME=skb_unload
    RESPOND PREFIX="Skillbility:" MSG="Unloading filament at {target}C"
    {% if printer.extruder.temperature < target - 5 %}
        M109 S{target}
    {% endif %}
    M83
    G1 E5 F{v.speed_slow}                      ; soften the tip
    G1 E-{v.unload_length} F{v.speed_fast}     ; pull clear
    M400
    RESPOND PREFIX="Skillbility:" MSG="Unload complete."
    RESTORE_GCODE_STATE NAME=skb_unload
