# Skillbility skill: maintenance-park v1.0.0
# https://github.com/MaxSikorski/skillbility
# License: MIT
#
# Adds MAINTENANCE: homes if needed, then parks the toolhead front-and-center
# at a comfortable working height. Positions come from your printer's own
# configured limits, so this is safe on any cartesian/corexy machine.

[gcode_macro _SKB_MAINTENANCE_PARK_VARS]
description: Settings for the Maintenance Park skill
variable_park_z: 100          ; working height (mm) — clamped to your Z max
variable_front_offset: 20     ; distance from the front Y limit (mm)
variable_travel_speed: 6000   ; move speed (mm/min)
gcode:
    # Settings container only — nothing to execute.

[gcode_macro MAINTENANCE]
description: Park the toolhead front-and-center for nozzle swaps and cleaning
gcode:
    {% set v = printer["gcode_macro _SKB_MAINTENANCE_PARK_VARS"] %}
    {% set ax = printer.toolhead.axis_maximum %}
    {% set an = printer.toolhead.axis_minimum %}
    {% set x_center = (ax.x + an.x) / 2 %}
    {% set y_front = an.y + v.front_offset %}
    {% set z_park = [v.park_z, ax.z - 5]|min %}
    {% if printer.print_stats.state == "printing" %}
        RESPOND PREFIX="Skillbility:" MSG="Refusing to park: a print is running. PAUSE first."
    {% else %}
        {% if "xyz" not in printer.toolhead.homed_axes %}
            RESPOND PREFIX="Skillbility:" MSG="Homing first..."
            G28
        {% endif %}
        RESPOND PREFIX="Skillbility:" MSG="Parking for maintenance"
        G90
        G1 Z{z_park} F{v.travel_speed}
        G1 X{x_center} Y{y_front} F{v.travel_speed}
        M400
        RESPOND PREFIX="Skillbility:" MSG="Parked at X{x_center|round(1)} Y{y_front|round(1)} Z{z_park|round(1)}"
    {% endif %}
