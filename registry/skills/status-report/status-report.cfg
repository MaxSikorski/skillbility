# Skillbility skill: status-report v1.0.0
# https://github.com/MaxSikorski/skillbility
# License: MIT
#
# Adds STATUS_REPORT: a read-only snapshot of your printer in the console.
# No motion, no heat — a safe first install to verify Skillbility works.

[gcode_macro STATUS_REPORT]
description: Print a snapshot of temps, position, homing, and factors
gcode:
    {% set e = printer.extruder %}
    {% set th = printer.toolhead %}
    {% set m = printer.gcode_move %}
    RESPOND PREFIX="Skillbility:" MSG="------ STATUS REPORT ------"
    RESPOND PREFIX="Skillbility:" MSG="State: {printer.print_stats.state}"
    RESPOND PREFIX="Skillbility:" MSG="Hotend: {e.temperature|round(1)}C / {e.target|round(0)}C"
    {% if printer.heater_bed is defined %}
        RESPOND PREFIX="Skillbility:" MSG="Bed: {printer.heater_bed.temperature|round(1)}C / {printer.heater_bed.target|round(0)}C"
    {% endif %}
    RESPOND PREFIX="Skillbility:" MSG="Homed axes: {th.homed_axes if th.homed_axes else 'none'}"
    RESPOND PREFIX="Skillbility:" MSG="Position: X{th.position.x|round(2)} Y{th.position.y|round(2)} Z{th.position.z|round(2)}"
    RESPOND PREFIX="Skillbility:" MSG="Speed factor: {(m.speed_factor * 100)|round(0)}%  Flow: {(m.extrude_factor * 100)|round(0)}%"
    RESPOND PREFIX="Skillbility:" MSG="---------------------------"
